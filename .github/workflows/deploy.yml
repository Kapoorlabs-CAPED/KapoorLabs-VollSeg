# Build the package and upload to PyPI when manually dispatched.
# Mirrors Kapoorlabs-CAPED/VollSeg's deploy.yml.
#
# Setup once per repo:
#   Settings → Secrets and variables → Actions → New repository secret
#     name : TWINE_API_KEY
#     value: pypi-...   (token from https://pypi.org/manage/account/token/
#                        scoped to the kapoorlabs-vollseg project)
#
# Trigger:
#   Actions → kapoorlabs-vollseg deploy → Run workflow
#
# What it does:
#   1. Checkout
#   2. python -m build .         → dist/*.whl + dist/*.tar.gz
#   3. twine upload dist/*       → publishes to PyPI under name `kapoorlabs-vollseg`

name: kapoorlabs-vollseg deploy
on:
  workflow_dispatch:
    inputs:
      name:
        description: "Hello KapoorLabs Lab member"
        default: "Ready to dispatch your code to PyPI"

jobs:

  deploy:

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U setuptools setuptools_scm wheel twine build
      - name: Build and publish
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TWINE_API_KEY }}
        run: |
          git tag
          python -m build .
          twine upload dist/*
