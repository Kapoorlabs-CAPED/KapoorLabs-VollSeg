# Each LR-schedule choice lives in its own ``parameters/scheduler/<name>.yaml``
# (Hydra config group). Override via the CLI as e.g.
# ``parameters/scheduler=cosine`` or ``parameters/scheduler=none`` тАФ the
# kwargs each scheduler's __init__ needs are inside its own yaml, no
# script-side hardcoding. Same pattern as ``lightning-kietzmannlab``.
defaults:
  - _self_
  - scheduler: warm_cosine

# UNet architecture (from careamics)
unet_depth: 3
num_channels_init: 64
use_batch_norm: True

# Patch shape (YX) for training
patch_y: 1024
patch_x: 1024

conv_dims: 2

# Training parameters
learning_rate: 0.0004
batch_size: 4
epochs: 100
num_workers: 8
devices: 'auto'
accelerator: 'cuda'
train_precision: '32'
strategy: 'auto'
gradient_clip_val: null
gradient_clip_algorithm: null
slurm_auto_requeue: True

# Optimizer (registry-keyed тАФ adam | adamw | sgd | lars | rmsprop)
optimizer: adam
weight_decay: 0.0

# Transform parameters
transform_preset: 'medium'
percentile_norm: True
pmin: 0.1
pmax: 99.9
gaussian_noise_std: 0.01
spatial_flip_p: 0.5
rotation_p: 0.5

# Validation split
val_fraction: 0.1

# Prediction parameters
n_tiles: [1, 1]
tile_overlap: 0.125
file_type: '*.tif'
