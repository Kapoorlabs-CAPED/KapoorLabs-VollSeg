defaults:
  - _self_
  - experiment_data_paths: predict_jeanzay

parameters:
  file_type: "*.tif"
  n_tiles: [1, 4, 4]
  tile_overlap: 0.125
  batch_size: 4
  n_rays: 96              # used only if rays.npy is missing in log_path
  # Sensible defaults; overridden by training_config.json["parameters"]
  # when the trained model folder ships its own (e.g. from a future
  # optimize_thresholds step).
  prob_thresh: 0.4
  nms_thresh: 0.3

  # Multi-GPU: set devices > 1 + strategy=ddp to T-shard a timelapse.
  devices: 4
  accelerator: "auto"
  strategy: "auto"
