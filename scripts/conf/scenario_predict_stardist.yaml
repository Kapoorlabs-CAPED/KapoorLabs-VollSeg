defaults:
  - _self_
  - experiment_data_paths: predict_jeanzay_stardist

parameters:
  file_type: "*.tif"
  n_tiles: [1, 4, 4]
  tile_overlap: 0.125
  batch_size: 4
  n_rays: 96              # used only if rays.npy is missing in log_path
  # Sensible defaults; overridden by training_config.json["parameters"]
  # when the trained model folder ships its own (e.g. from a future
  # optimize_thresholds step).
  prob_thresh: 0.4
  nms_thresh: 0.3

  # Multi-GPU: ``devices=-1`` picks up every GPU SLURM / CUDA_VISIBLE_DEVICES
  # exposes; ``strategy=ddp`` shards the T axis of a 4D input across those
  # GPUs (one rank per device) via Lightning's ``DistributedSampler``.
  # Launch under ``srun --ntasks-per-node=<n_gpus> --gres=gpu:<n_gpus>``.
  devices: -1
  accelerator: "auto"
  strategy: "ddp"
