base_data_dir: /path/to/experiment
input_dir: raw            # under base_data_dir
output_dir: prediction    # under base_data_dir; created if missing
log_path: /path/to/trained_model_folder

# Optional HuggingFace download. Set hf_repo_id to fetch from HF instead
# of loading from log_path on disk. The repo is cached under
# hf_model_dir/<repo-stem>/ (or under log_path if hf_model_dir is empty).
hf_repo_id: null          # e.g. "KapoorLabs/xenopus-stardist-pytorch"
hf_model_dir: ""
