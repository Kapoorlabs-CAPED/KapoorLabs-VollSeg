defaults:
  - _self_
  - experiment_data_paths: predict_combo_jeanzay

parameters:
  file_type: "*.tif"
  n_tiles: [1, 4, 4]
  tile_overlap: 0.125
  batch_size: 4

  # StarDist runtime — defaults overridden by training_config.json["parameters"]
  # on the StarDist model folder when present.
  n_rays: 96
  prob_thresh: 0.4
  nms_thresh: 0.3

  # Pipeline shape — set seedpool=true for the marker-controlled watershed
  # fusion (requires both stardist+unet). With seedpool=false, stardist
  # gives the instance labels and unet contributes its semantic mask on
  # the side.
  seedpool: false

  # Post-processing floors
  min_size_mask: 100         # remove_small_objects in the MaskUNet ROI
  min_size: 10               # remove_small_objects in the UNet output

  # Multi-GPU: ``devices=-1`` picks up every GPU SLURM / CUDA_VISIBLE_DEVICES
  # exposes; ``strategy=ddp`` shards the T axis of a 4D input across those
  # GPUs (one rank per device) via Lightning's ``DistributedSampler``.
  # Launch under ``srun --ntasks-per-node=<n_gpus> --gres=gpu:<n_gpus>``.
  devices: -1
  accelerator: "auto"
  strategy: "ddp"
