# Override per-cluster by selecting one of:
#   train_data_paths=xenopus_jeanzay
#   train_data_paths=xenopus_gwdg
base_data_dir: "/path/to/training_data"
raw_dir: "raw"
label_dir: "real_mask"

# Pre-computed binary masks (UNet only). When set and a matching file
# exists, used as the mask target instead of deriving binary from labels.
# Set to null to force on-the-fly derivation.
binary_mask_dir: "binary_mask"

h5_file: "h5/xenopus_train.h5"
