# UNet trunk
conv_dims: 3
in_channels: 1
unet_depth: 3
num_channels_init: 64
use_batch_norm: true

# StarDist-specific
n_rays: 96
anisotropy: [2.4285714285714284, 1.0, 1.0]    # Z:Y:X = 17/7 : 1 : 1, matches the keras Xenopus models (so refitted weights are size-comparable)
loss_lam: 0.2

# Training
epochs: 100
batch_size: 4
learning_rate: 4.0e-3
num_workers: 4
devices: 1
accelerator: "auto"
train_precision: "32-true"
strategy: "auto"

# Optimizer — registry-keyed (adam | adamw | adamw_clip | sgd | rmsprop | rprop | lars).
# Empty optimizer_kwargs uses the optimizer class's defaults.
optimizer: "adam"
optimizer_kwargs: {}

# Scheduler — registry-keyed (cosine | warm_cosine | cosine_restart |
# multistep | plateau | linear | constant | exponential | same | none).
# null → no scheduler. For cosine annealing, t_max should match the
# training horizon (i.e. ``epochs`` above).
scheduler: "cosine"
scheduler_kwargs:
  t_max: 100
  eta_min: 1.0e-6

slurm_auto_requeue: true

# Augmentation
pmin: 0.1
pmax: 99.9
augment: true
gaussian_noise_std: 0.01

# Stored on the LightningModule for inference time
n_tiles: [1, 4, 4]
tile_overlap: 0.125
