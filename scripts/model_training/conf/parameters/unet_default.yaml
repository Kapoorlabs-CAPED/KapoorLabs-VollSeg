# U-Net architecture
conv_dims: 3
in_channels: 1
num_classes: 1
unet_depth: 3
num_channels_init: 64
use_batch_norm: true

# Training
epochs: 200
batch_size: 4
learning_rate: 4.0e-3
num_workers: 4
devices: 1
accelerator: "auto"
train_precision: "32-true"
strategy: "auto"

# Optimizer — registry-keyed (adam | adamw | adamw_clip | sgd | rmsprop | rprop | lars).
optimizer: "adam"
optimizer_kwargs: {}

# Scheduler — registry-keyed (cosine | warm_cosine | cosine_restart |
# multistep | plateau | linear | constant | exponential | same | none).
# null → no scheduler. For cosine annealing, t_max should match ``epochs``.
scheduler: "cosine"
scheduler_kwargs:
  t_max: 200
  eta_min: 1.0e-6

slurm_auto_requeue: true

# Augmentation
pmin: 0.1
pmax: 99.9
augment: true
gaussian_noise_std: 0.01

# Loss function — "mse" → nn.MSELoss(), "mae" → nn.L1Loss().
# BCE is intentionally not offered: training the U-Net with regression-
# style losses against a {0, 1} mask works well for our class-imbalanced
# data and avoids the sign-flipped local minimum that BCE sometimes
# converges to on tiny training sets.
loss: "mse"

# Stored on the LightningModule for inference time
n_tiles: [1, 4, 4]
tile_overlap: 0.125
